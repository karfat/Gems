<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 380 100" width="380" height="100">
  <defs>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7eb8f7"/>
      <stop offset="100%" style="stop-color:#a78bfa"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <text x="50%" y="52"
        text-anchor="middle"
        font-family="'Segoe UI', Arial, sans-serif"
        font-size="44" font-weight="800" letter-spacing="3"
        fill="url(#textGrad)" filter="url(#glow)">Physical</text>

  <text x="50%" y="88"
        text-anchor="middle"
        font-family="'Segoe UI', Arial, sans-serif"
        font-size="30" font-weight="300" letter-spacing="14"
        fill="url(#textGrad)" opacity="0.85">Games</text>
</svg>
